<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Enlaza Font Awesome en tu index.html -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Colores existentes */
            --color-primary: #1a1a2e;
            --color-secondary: #16213e;
            --color-accent: #0f3460;
            --color-highlight: #e94560;
            --color-text: #eeeeee;
            --color-background: #f5f5f5;
            --color-card: #ffffff;
            
            /* Estados de productos (solo lo necesario) */
            --color-success: #10b981;      /* Verde - Disponible */
            --color-warning: #f59e0b;      /* Amarillo - Advertencia */
            --color-error: #ef4444;        /* Rojo - Sin stock */
            --color-info: #3b82f6;         /* Azul - Información */
        }

        /* Aplicando a tu página de productos */
        body {
            background-color: var(--color-background);
            color: var(--color-primary);
        }
        main{
            padding: 20px;
        }
        .filters-container{
            display: flex;
            justify-content: center;
            margin: 20px;
            gap: 10px;
            background-color: var(--color-card);
        }
        .filter-categoria, .filter-range, .filter-name{
            
            padding: 10px;
            border-radius: 5px;
        }

        .filter-categoria select{
            padding: 5px;
            width: 200px;
        }

        .filter-name input{
            padding: 5px;
            width: 200px;
        }
        .filter-range{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .filter-range .value-range-selected{
            display: flex;
            align-items: center;
        }
        .cards-container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background-color: var(--color-background);
        }
        .product-card{
            display: flex;
            flex-direction: column;
            width: 300px;
            height: 300px;
            background-color: var(--color-card);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin:12px;
            transition: transform 0.3s, box-shadow 0.3s;
    
        }

        .product-card:hover{
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        .card-title{
            text-align: center;
            background-color: var(--color-accent);
            color: var(--color-text);
            margin: 10px;
            border-radius:5px;
        }
        .card-body{
            display: flex;
            flex-direction: column;
            text-align: center;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .card-footer{
            text-align: center;
            margin-top: auto;
            padding: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1 class="title">TP5 JAVASCRIPT - Barrios Cristian Fernando</h1>
    </header>
    <main>
        <h1>Productos</h1>
        <div class="filters-container">
            
            <div class="filter-categoria">
                <i class="fa-solid fa-layer-group"></i>
                <select name="select-categoria" id="select-categoria">
                <option value="">seleccione un categoria</option>
                <option value="Electrónica">Electrónica</option>
                <option value="Accesorios">Accesorios</option>
                <option value="Muebles">Muebles</option>
            </select>
            </div>
            
            <div class="filter-range">
                
                <div class="value-range-selected">
                    <i class="fa-solid fa-dollar-sign"></i>
                    <input type="range" id="precioRange" min="0" max="1000000" value="1000000" step="5000">
                    <span>precio: $<span id="valorPrecioActual">0</span></span>
                </div>
                <span>Máx.: $<span id="valorPrecioMaximo">100000</span></span>
            </div>
            <div class="filter-name">
                <input type="text" name="inputSearch" id="inputSearch">
                <i class="fa-brands fa-sistrix"></i>
            </div>
        </div>
        <div class="cards-container" id="container-cards">
            
        </div>
    </main>
    <footer>
        
    </footer>
    <script src="./js/productos.js"></script>
</body>
</html>
