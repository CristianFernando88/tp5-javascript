<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP 5</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --color-primary: #1a1a2e;
            --color-secondary: #16213e;
            --color-accent: #0f3460;
            --color-highlight: #e94560;
            --color-text: #eeeeee;
            --color-background: #f5f5f5;
            --color-card: #ffffff;
        }
        .layout{
            display: grid;
        }

        body {
            background-color: var(--color-background);
            color: var(--color-primary);
        }
        .cards-container{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            background-color: var(--color-background);
        }
        .card {
            display: flex;
            flex-direction: column;
            width: 300px;
            background-color: var(--color-card);
            border-radius: 12px;
            margin: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        /* Contenedor de la imagen */
        .card-image {
            width: 100%;
            height: 300px;
            overflow: hidden;
            background-color: var(--color-secondary);
    
        }

        /* Imagen */
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit:cover;
            display: block;
            transition: transform 0.3s ease;
        }

        /* Efecto zoom al hover de la imagen */
        .card:hover .card-image img {
            transform: scale(1.1);
        }

        /* Capa overlay opcional al hover */
        .card-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .card:hover .card-image::after {
            opacity: 1;
        }

        /* Título de la card */
        .card-title {
            text-align: center;
            background-color: var(--color-accent);
            color: var(--color-text);
            padding: 12px;
            margin: 0;
            border-radius: 0;
        }

        .card-title h2 {
            font-size: 1.2rem;
            margin: 0;
        }

        /* Cuerpo de la card */
        .card-body {
            text-align: center;
            padding: 15px;
            flex: 1;
        }

        .card-body p {
            margin: 8px 0;
            font-size: 0.9rem;
            color: var(--color-primary);
        }      
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--color-accent);
            background-color: var(--color-card);
            border-radius: 12px;
            margin: 40px auto;
            max-width: 400px;
        }

        .error-message {
            text-align: center;
            padding: 40px;
            background-color: #fee2e2;
            border-left: 4px solid var(--color-error);
            color: #991b1b;
            border-radius: 8px;
            margin: 40px auto;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <header>

    </header>
    <main>
        <section>
            <h1>Api demo</h1>
            <div class="cards-container" id="contenedor-cards">

            </div>
        </section>
    </main>
    <footer>

    </footer>
    <script src="./js/api_demo.js"></script>
</body>
</html>
