<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Productos - TP4</title>
</head>
<body>
    <div class="layout">
        <header>
            <h1 class="header-title">BARRIOS CRISTIAN FERNANDO TP4 PP2</h1>
            
            <nav class="header-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="productos.html">Productos</a></li>
                    <li><a href="todo-app.html">Todo App</a></li>
                    <li><a href="api-demo.html">API Demo</a></li>
                </ul>
            </nav>
            
        </header>
        <main>
            <h1>Productos</h1>
            <div class="filters-container">
                
                <div class="filter-categoria">
                    <i class="fa-solid fa-layer-group"></i>
                    <select name="select-categoria" id="select-categoria">
                    <option value="">seleccione un categoria</option>
                    <option value="Electrónica">Electrónica</option>
                    <option value="Accesorios">Accesorios</option>
                    <option value="Muebles">Muebles</option>
                </select>
                </div>
                
                <div class="filter-range">
                    
                    <div class="value-range-selected">
                        <i class="fa-solid fa-dollar-sign"></i>
                        <input type="range" id="precioRange" min="0" max="1000000" value="1000000" step="5000">
                        <span>precio: $<span id="valorPrecioActual">0</span></span>
                    </div>
                    <span>Máx.: $<span id="valorPrecioMaximo">100000</span></span>
                </div>
                <div class="filter-name">
                    <input type="text" name="inputSearch" id="inputSearch">
                    <i class="fa-brands fa-sistrix"></i>
                </div>
            </div>
            <div class="cards-container" id="container-cards">
                
            </div>
        </main>
        <footer>
                <p>&copy; 2024 Cristian Fernando Barrios. Todos los derechos reservados.</p>
        </footer>
    </div>
    
    <script src="./js/productos.js"></script>
</body>
</html>
